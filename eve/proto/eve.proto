syntax = "proto3";

package eve.runtime;

// -----------------------------------------------------------------------------
// Base Event Definitions (Required on all events)
// -----------------------------------------------------------------------------
message EventContext {
    string session_id = 1;
    string message_id = 2;
    string request_id = 3;
    string trace_id = 4;
}

// -----------------------------------------------------------------------------
// Audio Streaming
// -----------------------------------------------------------------------------
message AudioInChunk {
    EventContext context = 1;
    bytes audio_data = 2; // 16kHz, 16-bit PCM
    bool is_speaking = 3; // VAD status
}

message AudioOutChunk {
    EventContext context = 1;
    bytes audio_data = 2; // 24kHz, 16-bit PCM
    bool end_of_stream = 3;
}

// -----------------------------------------------------------------------------
// Transcripts & Token Streams
// -----------------------------------------------------------------------------
message TranscriptEvent {
    EventContext context = 1;
    string text = 2;
    bool is_final = 3;
    float confidence = 4;
}

message TokenEvent {
    EventContext context = 1;
    string token = 2;
}

// -----------------------------------------------------------------------------
// Control & Interruption
// -----------------------------------------------------------------------------
message InterruptionEvent {
    EventContext context = 1;
    string reason = 2; // e.g., "barge_in", "user_cancelled"
}

// -----------------------------------------------------------------------------
// Services
// -----------------------------------------------------------------------------
service EveRuntime {
    // 1. Audio Ingress (Rust -> Python)
    // Streams raw PCM audio to the brain for STT/VAD processing.
    rpc StreamAudioIn(stream AudioInChunk) returns (stream TranscriptEvent);

    // 2. Intelligence Processing (Rust -> Python -> Rust)
    // Triggers LLM/TTS generation. Returns streaming audio chunks to Rust for playback.
    rpc ProcessInteraction(TranscriptEvent) returns (stream AudioOutChunk);

    // 3. Control Plane
    // Handles interruptions, state changes, etc.
    rpc SendControlEvent(InterruptionEvent) returns (EventContext);
}
